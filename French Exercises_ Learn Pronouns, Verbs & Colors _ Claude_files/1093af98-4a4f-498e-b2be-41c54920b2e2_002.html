let score = 0, totalQuestions = 0;

function updateScore(correct, total) {
  score += correct;
  totalQuestions += total;
  const percent = totalQuestions &gt; 0 ? Math.round((score / totalQuestions) * 100) : 0;
  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('scoreDisplay').textContent = score + '/' + totalQuestions;
}

function showSection(index) {
  document.querySelectorAll('.section').forEach(s =&gt; s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b =&gt; b.classList.remove('active'));
  document.getElementById('sec' + index).classList.add('active');
  event.target.classList.add('active');
}

// PRONOUNS + ÊTRE
const pronounsData = [
  { pronoun: 'Je', conjugation: 'suis', animal: 'un chat' },

  { pronoun: 'Elle', conjugation: 'est', animal: 'une grenouille' },
  { pronoun: 'Nous', conjugation: 'sommes', animal: 'des pandas' },
  { pronoun: 'Vous', conjugation: 'êtes', animal: 'des éléphants' },
  { pronoun: 'Ils', conjugation: 'sont', animal: 'des oiseaux' },
  { pronoun: 'Elles', conjugation: 'sont', animal: 'des giraffes' }
];

function generatePronouns() {
  const container = document.getElementById('pronounsContainer');
  container.innerHTML = '';
  pronounsData.forEach((p, i) =&gt; {
    const ex = document.createElement('div');
    ex.className = 'exercise';
    ex.innerHTML = `
      &lt;div class=&quot;exercise-text&quot;&gt;${i+1}. ${p.pronoun} ________ ${p.animal}&lt;/div&gt;
      &lt;input type=&quot;text&quot; class=&quot;input-field&quot; id=&quot;pron${i}&quot; placeholder=&quot;Conjugaison...&quot;&gt;
    `;
    container.appendChild(ex);
  });
}

function checkPronouns() {
  let correct = 0;
  pronounsData.forEach((p, i) =&gt; {
    const input = document.getElementById('pron' + i);
    const isCorrect = input.value.trim().toLowerCase() === p.conjugation.toLowerCase();
    if (isCorrect) {
      input.classList.add('correct');
      correct++;
    } else {
      input.classList.add('incorrect');
      input.value = 'Réponse: ' + p.conjugation;
    }
    input.disabled = true;
  });
  updateScore(correct, pronounsData.length);
  showFeedback('pronounsFeedback', correct === pronounsData.length ? '✅ Parfait!' : `${correct}/${pronounsData.length} correct(s)`, correct === pronounsData.length);
}

    const ex = document.createElement('div');
    ex.className = 'exercise';
    ex.innerHTML = `&lt;div class=&quot;exercise-text&quot;&gt;${i+1}. ${c.emoji} ${c.animal}&lt;/div&gt;`;
    const grid = document.createElement('div');
    grid.className = 'color-grid';
    c.colors.forEach(col =&gt; {
      const card = document.createElement('div');
      card.className = 'color-card';
      card.style.background = colorMap[col];
      card.textContent = col;
      card.onclick = () =&gt; selectColor(card, i, col === c.correct);
      card.dataset.correct = col === c.correct;
      card.id = 'color' + i + '_' + col;
      grid.appendChild(card);
    });
    ex.appendChild(grid);
    container.appendChild(ex);
  });
}

function selectColor(el, index, isCorrect) {
  const colors = document.querySelectorAll(`[id^=&quot;color${index}&quot;]`);
  colors.forEach(c =&gt; c.classList.remove('selected'));
  el.classList.add('selected');
  el.dataset.selected = 'true';
}

function checkColors() {
  let correct = 0;
  colorData.forEach((c, i) =&gt; {
    const selected = document.querySelector(`[id^=&quot;color${i}&quot;][data-selected=&quot;true&quot;]`);
    if (selected &amp;&amp; selected.dataset.correct === 'true') {
      correct++;
      selected.style.borderColor = '#22c55e';
    } else if (selected) {
      selected.style.borderColor = '#ef4444';
    }
  });
  updateScore(correct, colorData.length);
  showFeedback('colorsFeedback', correct === colorData.length ? '✅ Parfait!' : `${correct}/${colorData.length} correct(s)`, correct === colorData.length);
}

// MATCHING
let selectedPairs = [];

function selectMatch(el) {
  el.classList.toggle('selected');
  if (el.classList.contains('selected')) {
    selectedPairs.push(el);
    if (selectedPairs.length === 2) {
      const p1 = selectedPairs[0].dataset.pair;
      const p2 = selectedPairs[1].dataset.pair;
      if (p1 === p2) {
        selectedPairs[0].classList.add('matched');
        selectedPairs[1].classList.add('matched');
      }
      selectedPairs = [];
      document.querySelectorAll('.match-item.selected:not(.matched)').forEach(el =&gt; el.classList.remove('selected'));
    }
  }
}

function checkMatching() {
  const matched = document.querySelectorAll('.match-item.matched').length / 2;
  updateScore(matched, 6);
  showFeedback('matchingFeedback', matched === 6 ? '✅ Parfait!' : `${matched}/6 paires trouvées`, matched === 6);
}

function resetMatching() {
  document.querySelectorAll('.match-item').forEach(el =&gt; el.classList.remove('selected', 'matched'));
  selectedPairs = [];
}

// MIXED EXERCISES
const mixedExercises = [
  { type: 'pronoun', text: '_______ sommes des étudiants diligents', answer: 'Nous' },
  { type: 'avoir', text: 'Vous _______ une maison rouge', answer: 'avez' },
  { type: 'aller', text: 'Elles _______ à la plage ce weekend', answer: 'vont' },
  { type: 'pronoun', text: '_______ es très intelligent', answer: 'Tu' },
  { type: 'avoir', text: 'J\'_______ trois chats noirs', answer: 'ai' },
  { type: 'aller', text: 'Il _______ au marché aujourd\'hui', answer: 'va' }
];

function generateMixed() {
  const container = document.getElementById('mixedContainer');
  container.innerHTML = '';
  mixedExercises.forEach((ex, i) =&gt; {
    const div = document.createElement('div');
    div.className = 'exercise';
    div.innerHTML = `
      &lt;div class=&quot;exercise-text&quot;&gt;${i+1}. ${ex.text}&lt;/div&gt;
      &lt;input type=&quot;text&quot; class=&quot;input-field&quot; id=&quot;mixed${i}&quot; placeholder=&quot;Réponse...&quot;&gt;
    `;
    container.appendChild(div);
  });
}

function checkMixed() {
  let correct = 0;
  mixedExercises.forEach((ex, i) =&gt; {
    const input = document.getElementById('mixed' + i);
    const isCorrect = input.value.trim().toLowerCase() === ex.answer.toLowerCase();
    if (isCorrect) {
      input.classList.add('correct');
      correct++;
    } else {
      input.classList.add('incorrect');
      input.value = 'Réponse: ' + ex.answer;
    }
    input.disabled = true;
  });
  updateScore(correct, mixedExercises.length);
  showFeedback('mixedFeedback', correct === mixedExercises.length ? '✅ Parfait!' : `${correct}/${mixedExercises.length} correct(s)`, correct === mixedExercises.length);
}

function showFeedback(elementId, message, isSuccess) {
  const el = document.getElementById(elementId);
  el.textContent = message;
  el.className = 'feedback ' + (isSuccess ? 'success' : 'info');
}

// Initialize
generatePronouns();
generateAvoir();
generateAller();
generateColors();
generateMixed();
